# ============================================================
#  graph-imgrag | Configuration
# ============================================================

dataset:
  # ── Local dataset paths ──────────────────────────────────
  # Your COCO images are already downloaded here.
  # The pipeline reads directly from these folders —
  # no re-downloading needed.
  #
  # Use forward slashes even on Windows.
  # Example (absolute):  D:/PycharmProjects/graph-imgrag-coco/dataset/val2017
  # Example (relative):  dataset/val2017
  local_images_dir: "dataset/val2017"     # primary split used for indexing
  local_train_dir:  "dataset/train2017"   # optional — leave as-is to skip
  local_test_dir:   "dataset/test2017"    # optional — leave as-is to skip

  # ── Pipeline working directories ─────────────────────────
  raw_dir:          dataset/raw
  processed_dir:    dataset/processed/images   # images organised here by category
  ocr_text_dir:     dataset/processed/ocr_text
  annotations_dir:  dataset/annotations

  # ── COCO annotation settings ─────────────────────────────
  coco_year:  "2017"
  coco_split: "val2017"    # must match the split in local_images_dir

  # Maximum images to index (set null to index everything)
  max_images: 500
  num_images: 500          # alias used by tests

  # ── COCO supercategories to include ──────────────────────
  categories:
    - person
    - vehicle
    - outdoor
    - animal
    - accessory
    - sports
    - kitchen
    - food
    - furniture
    - electronic
    - appliance
    - indoor

ocr:
  languages: ["en"]
  gpu: false          # set true if you have a CUDA GPU
  paragraph: true

embeddings:
  model: "all-MiniLM-L6-v2"
  batch_size: 32
  normalize: true
  output_file: outputs/embeddings/image_embeddings.pkl

graph:
  knn_k: 5
  output_file: outputs/graphs/similarity_graph.gpickle
  output_gexf: outputs/graphs/similarity_graph.gexf
  output_png:  outputs/graphs/similarity_graph.png

retrieval:
  top_k: 5
  expand_graph: true
  expansion_depth: 2
  results_dir: outputs/retrieval_results

evaluation:
  k: 5
  # Queries now include the exact supercategory word so they match the
  # enriched embeddings (OCR text + category label) produced by extract_text.py
  queries:
    person:      "person"
    vehicle:     "vehicle"
    outdoor:     "outdoor"
    animal:      "animal"
    sports:      "sports"
    food:        "food"
    furniture:   "furniture"
    electronic:  "electronic"
    kitchen:     "kitchen"
    indoor:      "indoor"

app:
  title: "Graph-Based Image Retrieval — COCO Dataset"
  port: 8501